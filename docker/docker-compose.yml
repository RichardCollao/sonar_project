# Levantar este stack:
# docker compose -f docker-compose.yml up -d --force-recreate

name: dev_utils

x-paths:
  host_root: &host_root ${HOST_ROOT:-../..} # relativo al directorio del compose

services:
  sonarqube:
    image: sonarqube:26.3.0.120487-community
    container_name: sonarqube
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - sonar_net

  app:
    # image: richardcollao/dev_utils:1.0.0
    build:
      context: ..                            # raíz del proyecto (dev_utils/)
      dockerfile: docker/Dockerfile
    container_name: dev_utils
    user: root
    depends_on:
      - sonarqube
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      # Necesario para que el explorador de archivos (BASE_DIR=/workspace)
      # pueda listar carpetas del host sin devolver HTTP 500.
      - type: bind
        source: *host_root
        target: /workspace
      # Necesario para ejecutar `docker exec ...` desde la app
      # (SemgrepScanner / GitleaksScanner lanzados por node-pty).
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
    networks:
      - sonar_net

  gitleaks:
    image: zricethezav/gitleaks:v8.30.1
    container_name: gitleaks
    working_dir: /workspace
    entrypoint: ["tail", "-f", "/dev/null"]
    volumes:
      - type: bind
        source: *host_root
        target: /workspace
    networks:
      - sonar_net

  semgrep:
    image: semgrep/semgrep:1.157.0
    container_name: semgrep
    working_dir: /workspace
    entrypoint: ["tail", "-f", "/dev/null"]
    volumes:
      - type: bind
        source: *host_root
        target: /workspace
    networks:
      - sonar_net

networks:
  sonar_net:
    driver: bridge

volumes:
  sonarqube_data:
  sonarqube_logs:
